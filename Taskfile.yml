# go-task タスクランナー。Nix devShell 経由で task を導入。
# 一覧: `task --list`
version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: 依存インストール + Git hooks 設置
    cmds:
      - pnpm install
      - lefthook install

  dev:
    desc: 全アプリの開発サーバを起動 (turbo)
    cmds:
      - pnpm turbo run dev

  dev:mobile:
    desc: Expo モバイルアプリを起動
    dir: apps/mobile
    cmds:
      - pnpm dev

  dev:api:
    desc: Cloudflare Workers API を起動 (wrangler dev)
    dir: services/api
    cmds:
      - pnpm dev

  build:
    desc: 全パッケージをビルド
    cmds:
      - pnpm turbo run build

  typecheck:
    desc: 型チェック (tsc --noEmit)。CI の "TypeScript check" 相当
    cmds:
      - pnpm turbo run build

  lint:
    desc: Lint
    cmds:
      - pnpm turbo run lint

  format:
    desc: フォーマット
    cmds:
      - pnpm turbo run format

  test:
    desc: テスト
    cmds:
      - pnpm turbo run test

  db:migrate:local:
    desc: D1 ローカルマイグレーション適用
    dir: services/api
    cmds:
      - pnpm db:migrate:local

  db:migrate:prod:list:
    desc: 本番 D1 の未適用マイグレーションを確認（適用はしない）
    dir: services/api
    cmds:
      - pnpm wrangler d1 migrations list animeishi-db --remote --env production

  db:migrate:prod:
    desc: 本番 D1 にマイグレーションを適用（破壊的操作あり・確認プロンプト付き）
    dir: services/api
    # 誤爆防止: 実行前に未適用一覧を見せて y/N で確認する。
    prompt: 本番 D1 にマイグレーションを適用します。0002 等の破壊的マイグレーションを含む場合データが失われます。続行しますか？
    cmds:
      # まず未適用の一覧を表示してから適用する。
      - pnpm wrangler d1 migrations list animeishi-db --remote --env production
      - pnpm wrangler d1 migrations apply animeishi-db --remote --env production

  dev:api:scheduled:
    desc: Cron バッチを手動トリガーできる状態で API を起動 (wrangler dev --test-scheduled)
    dir: services/api
    cmds:
      # 起動後に別端末から下記で手動トリガーできる:
      #   curl "http://localhost:8787/__scheduled?cron=0+18+*+*+*"   # anime-sync
      #   curl "http://localhost:8787/__scheduled?cron=0+*/6+*+*+*"  # season-sync
      - pnpm wrangler dev --test-scheduled
