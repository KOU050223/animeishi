# CodeRabbit 設定ファイル
# docs: https://docs.coderabbit.ai/guides/configure-coderabbit

version: "2"

# main 以外へのPRもレビュー対象にする（auto_review.base_branches で設定）
reviews:
  # レビューの設定
  profile: "chill"           # assertive / chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai"
  poem: false
  review_status: true
  collapse_walkthrough: false

  # パスフィルター（レビューから除外するファイル）
  path_filters:
    - "!**/node_modules/**"
    - "!**/.expo/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.lock"
    - "!**/package-lock.json"

  # パス別の指示
  # NOTE: apps/mobile と apps/api はディレクトリ追加後に有効になります
  path_instructions:
    - path: "apps/mobile/**"
      instructions: |
        React Native のコードをレビューしてください。
        - コンポーネントのパフォーマンス（不要な再レンダリング）を確認してください
        - StyleSheet.create を使用しているか確認してください
        - Expo SDK の使い方が適切か確認してください
        - iOS / Android 両プラットフォームへの影響を考慮してください
        - アクセシビリティ属性（accessibilityLabel など）が適切に設定されているか確認してください

    - path: "apps/api/**"
      instructions: |
        Hono フレームワークのコードをレビューしてください。
        - ルーティングの設計が適切か確認してください
        - バリデーション（zod など）が適切に実装されているか確認してください
        - エラーハンドリングが適切か確認してください
        - 認証・認可ロジックを注意深く確認してください
        - SQLインジェクションや他のセキュリティ脆弱性がないか確認してください

    - path: "**/*.ts"
      instructions: |
        TypeScript のベストプラクティスを確認してください。
        - any 型の使用を避けているか確認してください
        - 型定義が適切か確認してください

    - path: "**/*.tsx"
      instructions: |
        React / React Native コンポーネントのベストプラクティスを確認してください。
        - hooks のルール（React Hooks rules）に従っているか確認してください
        - メモ化（useMemo / useCallback）が適切に使われているか確認してください

  # 自動レビューの設定
  auto_review:
    enabled: true
    drafts: false           # ドラフトPRはレビューしない
    base_branches:
      - ".*"               # すべてのブランチへのPRをレビュー

# チャット機能の設定
chat:
  auto_reply: true

# コードの説明機能
code_generation:
  docstrings:
    language: "ja"         # 日本語でコメントを生成
