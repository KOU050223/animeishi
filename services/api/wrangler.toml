name = "animeishi-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "animeishi-db"
database_id = "local-dev-placeholder"

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "animeishi-db"
database_id = "REPLACE_WITH_PROD_ID"
