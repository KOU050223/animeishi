name = "animeishi-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "996d4f5f54227fcc10dd15a2baee0a5b"

# Annict OAuth クライアント ID（公開可）。client_secret は Workers Secret として
# `wrangler secret put ANNICT_CLIENT_SECRET` で別途登録する（コミットしない）。
# ローカル開発では .dev.vars に ANNICT_CLIENT_ID / ANNICT_CLIENT_SECRET を置く。
[vars]
# ANNICT_CLIENT_ID = "<your-annict-client-id>"

[[d1_databases]]
binding = "DB"
database_name = "animeishi-db"
database_id = "ae2dfdcb-2d1e-4436-97b4-552c6ca31ede"

# プロフィール画像（アバター）保存用 R2 バケット
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "animeishi-avatars"

[env.production]
[env.production.vars]
ENVIRONMENT = "production"
ANNICT_CLIENT_ID = "-W-RsOBNzzbMB6R2ldaOl8J9M6t3rBRLLQdsqV-PBxo"
# CORS 許可オリジン（カンマ区切り）。"*" 始まりはサフィックス一致（プレビューデプロイ用）。
# 詳細は src/cors.ts および docs/04_deployment.md を参照。
ALLOWED_ORIGINS = "https://animeishi-web-production.uozumi05.workers.dev,*-animeishi-web-production.uozumi05.workers.dev,https://animeishi.uomi.dev,http://localhost:8081"

[[env.production.d1_databases]]
binding = "DB"
database_name = "animeishi-db"
database_id = "ae2dfdcb-2d1e-4436-97b4-552c6ca31ede"

[[env.production.r2_buckets]]
binding = "AVATARS"
bucket_name = "animeishi-avatars"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
