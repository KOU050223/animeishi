name = "animeishi-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "996d4f5f54227fcc10dd15a2baee0a5b"

# Cron トリガー（src/cron/index.ts の handleScheduled が cron 式で分岐する）
#   "0 18 * * *"  : 毎日 18:00 UTC（JST 翌 3:00）に全アニメデータを同期
#   "0 */6 * * *" : 6 時間ごとに現在シーズンのアニメ情報を更新
[triggers]
crons = ["0 18 * * *", "0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "animeishi-db"
database_id = "ae2dfdcb-2d1e-4436-97b4-552c6ca31ede"

# プロフィール画像（アバター）保存用 R2 バケット
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "animeishi-avatars"

[env.production]
[env.production.triggers]
crons = ["0 18 * * *", "0 */6 * * *"]

[env.production.vars]
ENVIRONMENT = "production"
# CORS 許可オリジン（カンマ区切り）。"*" 始まりはサフィックス一致（プレビューデプロイ用）。
# 詳細は src/cors.ts および docs/04_deployment.md を参照。
ALLOWED_ORIGINS = "https://animeishi-web-production.uozumi05.workers.dev,*-animeishi-web-production.uozumi05.workers.dev,https://animeishi.uomi.dev,http://localhost:8081"

[[env.production.d1_databases]]
binding = "DB"
database_name = "animeishi-db"
database_id = "ae2dfdcb-2d1e-4436-97b4-552c6ca31ede"

[[env.production.r2_buckets]]
binding = "AVATARS"
bucket_name = "animeishi-avatars"
